<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>CalcUK</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        .calculator { margin-bottom: 40px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }\n        h2 { color: #333; }\n        input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; }\n        button { padding: 10px 15px; background-color: #5cb85c; color: white; border: none; border-radius: 5px; cursor: pointer; }\n        button:hover { background-color: #4cae4c; }\n    </style>\n</head>\n<body>\n    <div class="calculator">\n        <h2>Income Tax Calculator</h2>\n        <input type="number" id="income" placeholder="Enter your income">\n        <button onclick="calculateIncomeTax()">Calculate Income Tax</button>\n        <p id="incomeTaxResult"></p>\n    </div>\n    <div class="calculator">\n        <h2>Stamp Duty Calculator</h2>\n        <input type="number" id="propertyValue" placeholder="Enter property value">\n        <button onclick="calculateStampDuty()">Calculate Stamp Duty</button>\n        <p id="stampDutyResult"></p>\n    </div>\n    <div class="calculator">\n        <h2>VAT Calculator</h2>\n        <input type="number" id="price" placeholder="Enter price">\n        <button onclick="calculateVAT()">Calculate VAT</button>\n        <p id="vatResult"></p>\n    </div>\n    <script>\n        function calculateIncomeTax() {\n            const income = parseFloat(document.getElementById('income').value);\n            let tax = 0;\n            if (income > 12500) {\n                tax = (income - 12500) * 0.2;\n            }\n            document.getElementById('incomeTaxResult').innerText = `Income Tax: £${tax.toFixed(2)}`;\n        }\n        function calculateStampDuty() {\n            const propertyValue = parseFloat(document.getElementById('propertyValue').value);\n            let duty = 0;\n            if (propertyValue > 125000) {\n                duty = (propertyValue - 125000) * 0.02;\n            }\n            document.getElementById('stampDutyResult').innerText = `Stamp Duty: £${duty.toFixed(2)}`;\n        }\n        function calculateVAT() {\n            const price = parseFloat(document.getElementById('price').value);\n            const vat = price * 0.2;\n            document.getElementById('vatResult').innerText = `VAT: £${vat.toFixed(2)}`;\n        }\n    </script>\n</body>\n</html>\n
